<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Dead Drop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; }
        .header { background: #111; padding: 12px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; letter-spacing: 2px; }
        .status { font-size: 12px; color: #888; }
        .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot.active { background: #00ff41; }
        .dot.inactive { background: #ff4444; }

        .container { padding: 20px; }

        .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .stat { background: #111; border: 1px solid #333; padding: 8px 14px; border-radius: 4px; }
        .stat .num { font-size: 20px; color: #fff; }
        .stat .label { font-size: 10px; color: #888; text-transform: uppercase; }

        .section-title { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: #888; font-weight: normal; padding: 6px 10px; border-bottom: 1px solid #333; font-size: 11px; text-transform: uppercase; }
        td { padding: 6px 10px; border-bottom: 1px solid #1a1a1a; }
        tr:hover { background: #111; }

        .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
        .tag.pending { background: #ff8800; color: #000; }
        .tag.delivered { background: #333; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MESH DEAD DROP</h1>
        <div class="status">
            <span class="dot active" id="ws-dot"></span>
            <span id="ws-status">Connecting...</span>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total Messages</div></div>
            <div class="stat"><div class="num" id="stat-delivered">0</div><div class="label">Delivered</div></div>
            <div class="stat"><div class="num" id="stat-pending" style="color:#ff8800">0</div><div class="label">Pending</div></div>
            <div class="stat"><div class="num" id="stat-nodes">0</div><div class="label">Known Nodes</div></div>
        </div>

        <div class="section-title">Registered nodes</div>
        <table>
            <thead>
                <tr><th>Callsign</th><th>Last Seen</th><th>Interactions</th><th>Pending</th></tr>
            </thead>
            <tbody id="node-table"></tbody>
        </table>

        <div class="section-title">Message log</div>
        <table>
            <thead>
                <tr><th>Time</th><th>Sender</th><th>Recipient</th><th>Status</th></tr>
            </thead>
            <tbody id="msg-table"></tbody>
        </table>
    </div>

    <script>
        let ws;
        function connectWs() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws/status`);
            ws.onopen = () => {
                document.getElementById('ws-dot').className = 'dot active';
                document.getElementById('ws-status').textContent = 'Connected';
            };
            ws.onclose = () => {
                document.getElementById('ws-dot').className = 'dot inactive';
                document.getElementById('ws-status').textContent = 'Disconnected';
                setTimeout(connectWs, 2000);
            };
            ws.onmessage = (e) => {
                const stats = JSON.parse(e.data);
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-delivered').textContent = stats.delivered;
                document.getElementById('stat-pending').textContent = stats.pending;
                document.getElementById('stat-nodes').textContent = stats.nodes;
            };
        }

        function timeAgo(iso) {
            const diff = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
            if (diff < 60) return diff + 's ago';
            if (diff < 3600) return Math.round(diff / 60) + 'm ago';
            return Math.round(diff / 3600) + 'h ago';
        }

        async function pollTables() {
            try {
                const [nodesRes, msgsRes] = await Promise.all([
                    fetch('/api/nodes'), fetch('/api/messages')
                ]);
                const nodes = await nodesRes.json();
                const msgs = await msgsRes.json();

                document.getElementById('node-table').innerHTML = nodes.map(n =>
                    `<tr><td>${n.callsign}</td><td>${timeAgo(n.last_seen)}</td><td>${n.message_count}</td><td>${n.pending > 0 ? '<span class="tag pending">' + n.pending + '</span>' : '0'}</td></tr>`
                ).join('');

                document.getElementById('msg-table').innerHTML = msgs.map(m =>
                    `<tr><td>${timeAgo(m.timestamp)}</td><td>${m.sender}</td><td>${m.recipient}</td><td><span class="tag ${m.delivered ? 'delivered' : 'pending'}">${m.delivered ? 'DELIVERED' : 'PENDING'}</span></td></tr>`
                ).join('');
            } catch (e) {}
        }

        connectWs();
        pollTables();
        setInterval(pollTables, 3000);
    </script>
</body>
</html>
